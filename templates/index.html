<!DOCTYPE html>
<html>
<head>
    <title>Hacker Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: black; color: #00ff00; font-family: monospace; }
        #login-screen { text-align: center; margin-top: 100px; }
        #chat-screen { display: none; padding: 20px; }
        input { background: black; color: #00ff00; border: 1px solid #00ff00; padding: 10px; width: 250px; outline: none; }
        button { background: #00ff00; color: black; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #messages { border: 1px solid #00ff00; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: rgba(0, 20, 0, 0.5); }
        .msg-line { margin-bottom: 5px; border-bottom: 1px dotted #004400; padding-bottom: 2px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>[ SİSTEME ERİŞİM İÇİN KOD ADI GİRİN ]</h1>
        <input type="text" id="username" placeholder="Kod Adınız..." onkeypress="if(event.key==='Enter') startChat()">
        <button onclick="startChat()">BAĞLAN</button>
    </div>

    <div id="chat-screen">
        <div id="messages"></div>
        <input type="text" id="msg" placeholder="Mesajınızı buraya yazın..." style="width: 70%;" onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">GÖNDER</button>
    </div>

    <script>
        var socket = io();
        var myName = "";

        function startChat() {
            var input = document.getElementById("username");
            if(input.value.trim() != "") {
                myName = input.value;
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("chat-screen").style.display = "block";
            }
        }

        function sendMessage() {
            var msgInput = document.getElementById("msg");
            if(msgInput.value.trim() != "") {
                socket.emit('message', { name: myName, msg: msgInput.value });
                msgInput.value = "";
            }
        }

        socket.on('message', function(data) {
            var div = document.createElement("div");
            div.className = "msg-line";
            div.innerHTML = "<span style='color: #88ff88;'>[" + data.name + "]:</span> " + data.msg;
            var msgBox = document.getElementById("messages");
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
        });
    </script>
</body>
</html>
